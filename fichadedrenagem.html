<h2>Ficha de Avaliação - Drenagem Linfática</h2>

<form>

<label>Nome</label>
<input type="text" name="nome">

<label>Endereço</label>
<input type="text" name="endereco">

<label>Telefone</label>
<input type="text" name="telefone">

<label>Convênio</label>
<input type="text" name="convenio">

<label>Data nascimento</label>
<input type="date" name="dn">

<label>Idade</label>
<input type="number" name="idade">

<label>Altura (cm)</label>
<input type="number" name="altura">

<label>Peso (kg)</label>
<input type="number" step="0.1" name="peso">

<label>Data</label>
<input type="date" name="data">

<label>Queixa</label>
<textarea name="queixa"></textarea>

<label>História da doença atual</label>
<textarea name="hda"></textarea>

<label>Avaliação</label>
<textarea name="avaliacao"></textarea>

<label>História patológica pregressa</label>
<textarea name="hpp"></textarea>

<button type="submit">Salvar</button>

</form>
