<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Anamnese - Acupuntura</title>
<style>
body { font-family: Arial; max-width: 900px; margin: auto; }
label { display: block; margin-top: 10px; font-weight: bold; }
input, textarea, select {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
}
textarea { height: 80px; }
.section {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ccc;
}
</style>
</head>
<body>

<h2>Anamnese - Acupuntura</h2>

<form>

<div class="section">

<label>Nome</label>
<input type="text" name="nome">

<label>Data da consulta</label>
<input type="date" name="data_consulta">

<label>Endereço</label>
<input type="text" name="endereco">

<label>Telefone</label>
<input type="text" name="telefone">

<label>Data de nascimento</label>
<input type="date" name="dn">

<label>Profissão</label>
<input type="text" name="profissao">

<label>Religião</label>
<input type="text" name="religiao">

<label>Idade</label>
<input type="number" name="idade">

<label>Estado civil</label>
<input type="text" name="estado_civil">

<label>Filhos</label>
<input type="text" name="filhos">

<label>Já fez acupuntura?</label>
<select name="acupuntura">
<option>Sim</option>
<option>Não</option>
</select>

</div>

<div class="section">

<label>Queixa principal</label>
<textarea name="queixa"></textarea>

<label>História da doença atual</label>
<textarea name="hda"></textarea>

<label>Medicação em uso</label>
<textarea name="medicacao"></textarea>

<label>História patológica pregressa</label>
<textarea name="hpp"></textarea>

<label>Doenças na família</label>
<textarea name="familia"></textarea>

<label>Rotina diária</label>
<textarea name="rotina"></textarea>

<label>Atividade física</label>
<textarea name="atividade"></textarea>

</div>

<div class="section">

<label>Sono</label>
<textarea name="sono"></textarea>

<label>Emoção predominante</label>
<input type="text" name="emocao">

<label>Sabor preferido</label>
<input type="text" name="sabor">

<label>Pulso direito</label>
<input type="text" name="pulso_direito">

<label>Pulso esquerdo</label>
<input type="text" name="pulso_esquerdo">

<label>Língua</label>
<textarea name="lingua"></textarea>

<label>Diagnóstico</label>
<textarea name="diagnostico"></textarea>

<label>Prescrição</label>
<textarea name="prescricao"></textarea>

<label>Observações</label>
<textarea name="obs"></textarea>

</div>

<button type="submit">Salvar</button>

</form>

</body>
</html>
