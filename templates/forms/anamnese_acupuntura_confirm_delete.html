{% extends 'base.html' %}

{% block title %}Deletar - Acupuntura{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>Deletar Anamnese - Acupuntura</h1>
    </div>
</div>

<div class="card border-danger">
    <div class="card-body">
        <p class="text-danger">Tem certeza que deseja deletar a anamnese de <strong>{{ object.nome }}</strong>?</p>
        <p class="text-muted">Esta ação não pode ser desfeita.</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2 d-sm-flex justify-content-center">
                <button type="submit" class="btn btn-danger">Deletar</button>
                <a href="{% url 'anamnese-acupuntura-list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
